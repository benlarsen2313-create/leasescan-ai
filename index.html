<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeaseScan AI — Know Before You Sign</title>
  <meta name="description" content="Upload any residential lease — LeaseScan AI flags risky clauses, hidden fees, and tells you if you're overpaying for your area." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .drop-zone.dragging { border-color: #3b82f6; background-color: #eff6ff; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800" x-data="leaseApp()" x-cloak>

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">L</div>
      <span class="font-semibold text-slate-800">LeaseScan <span class="text-blue-600">AI</span></span>
    </div>
    <span class="text-xs text-slate-400 bg-slate-100 px-3 py-1 rounded-full">Beta</span>
  </header>

  <!-- Hero -->
  <section class="text-center py-14 px-4">
    <h1 class="text-4xl font-bold text-slate-900 mb-3">Know Before You Sign</h1>
    <p class="text-slate-500 text-lg max-w-xl mx-auto">Upload any residential lease — LeaseScan AI flags risky clauses, hidden fees, and tells you if you're overpaying for your area.</p>
  </section>

  <!-- Main Card -->
  <main class="max-w-4xl mx-auto px-4 pb-20">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <div class="grid md:grid-cols-5 gap-8">

        <!-- Left: Upload + Options -->
        <div class="md:col-span-3 space-y-5">

          <!-- Drop Zone -->
          <div
            class="drop-zone border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center cursor-pointer transition-all hover:border-blue-400 hover:bg-blue-50"
            :class="{'dragging': isDragging}"
            @dragover.prevent="isDragging=true"
            @dragleave.prevent="isDragging=false"
            @drop.prevent="handleDrop($event)"
            @click="$refs.fileInput.click()"
          >
            <input type="file" accept=".pdf" class="hidden" x-ref="fileInput" @change="handleFileInput($event)" />

            <template x-if="!file">
              <div>
                <div class="w-16 h-16 mx-auto mb-4 bg-blue-50 rounded-2xl flex items-center justify-center">
                  <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                  </svg>
                </div>
                <p class="text-slate-700 font-medium">Drop your lease PDF here</p>
                <p class="text-slate-400 text-sm mt-1">or click to browse</p>
                <p class="text-slate-300 text-xs mt-3">PDF files only · Max 20MB</p>
              </div>
            </template>

            <template x-if="file">
              <div>
                <div class="w-16 h-16 mx-auto mb-4 bg-green-50 rounded-2xl flex items-center justify-center">
                  <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"/>
                  </svg>
                </div>
                <p class="text-slate-700 font-medium" x-text="file.name"></p>
                <p class="text-slate-400 text-sm mt-1" x-text="formatSize(file.size)"></p>
                <p class="text-blue-500 text-xs mt-3 underline" @click.stop="clearFile()">Remove file</p>
              </div>
            </template>
          </div>

          <!-- Location input -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Your City / ZIP <span class="text-slate-400 font-normal">(for rent comparison)</span></label>
            <input
              type="text"
              x-model="location"
              placeholder="e.g. Austin, TX or 78701"
              class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
            <p class="text-xs text-slate-400 mt-1">For rent comparison</p>
          </div>

          <!-- Bedrooms -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Bedrooms</label>
            <select x-model="bedrooms" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
              <option value="studio">Studio</option>
              <option value="1" selected>1 Bedroom</option>
              <option value="2">2 Bedrooms</option>
              <option value="3">3 Bedrooms</option>
              <option value="4+">4+ Bedrooms</option>
            </select>
          </div>
        </div>

        <!-- Right: Analyze Button + Info -->
        <div class="md:col-span-2 flex flex-col justify-between gap-6">
          <div class="bg-slate-50 rounded-2xl p-5 space-y-4">
            <p class="text-sm font-semibold text-slate-700">What you'll get:</p>
            <ul class="space-y-3">
              <template x-for="item in features">
                <li class="flex items-start gap-2 text-sm text-slate-600">
                  <svg class="w-4 h-4 text-blue-500 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                  </svg>
                  <span x-text="item"></span>
                </li>
              </template>
            </ul>
          </div>

          <button
            @click="analyze()"
            :disabled="!file || loading"
            class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-2xl py-4 transition-colors flex items-center justify-center gap-2"
          >
            <template x-if="loading">
              <svg class="spinner w-5 h-5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
              </svg>
            </template>
            <span x-text="loading ? 'Analyzing...' : 'Analyze My Lease →'"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Error -->
    <template x-if="error">
      <div class="mt-6 bg-red-50 border border-red-200 rounded-2xl p-5 fade-in">
        <p class="text-red-700 font-medium text-sm" x-text="error"></p>
      </div>
    </template>

    <!-- Results -->
    <template x-if="results">
      <div class="mt-8 space-y-6 fade-in">

        <!-- Score -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex items-center gap-6">
          <div class="shrink-0">
            <div class="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-bold border-4"
              :class="{
                'border-green-400 bg-green-50 text-green-700': results.risk_score <= 3,
                'border-yellow-400 bg-yellow-50 text-yellow-700': results.risk_score > 3 && results.risk_score <= 6,
                'border-red-400 bg-red-50 text-red-700': results.risk_score > 6
              }"
              x-text="results.risk_score + '/10'"
            ></div>
          </div>
          <div>
            <p class="text-sm text-slate-500 mb-1">Overall Risk Score</p>
            <p class="text-xl font-bold"
              :class="{
                'text-green-700': results.risk_score <= 3,
                'text-yellow-700': results.risk_score > 3 && results.risk_score <= 6,
                'text-red-700': results.risk_score > 6
              }"
              x-text="results.risk_score <= 3 ? 'Low Risk' : results.risk_score <= 6 ? 'Moderate Risk' : 'High Risk'"
            ></p>
            <p class="text-slate-500 text-sm mt-1" x-text="results.summary"></p>
          </div>
        </div>

        <!-- Rent Comparison -->
        <template x-if="results.rent_analysis">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
              </svg>
              Rent Comparison
            </h2>
            <p class="text-slate-600 text-sm" x-text="results.rent_analysis"></p>
          </div>
        </template>

        <!-- Risky Clauses -->
        <template x-if="results.risky_clauses && results.risky_clauses.length">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
              Risky Clauses
            </h2>
            <div class="space-y-4">
              <template x-for="clause in results.risky_clauses" :key="clause.title">
                <div class="bg-red-50 border border-red-100 rounded-xl p-4">
                  <div class="flex items-center justify-between mb-1">
                    <p class="font-medium text-red-800 text-sm" x-text="clause.title"></p>
                    <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                      :class="{
                        'bg-red-100 text-red-700': clause.severity === 'high',
                        'bg-yellow-100 text-yellow-700': clause.severity === 'medium',
                        'bg-blue-100 text-blue-700': clause.severity === 'low'
                      }"
                      x-text="clause.severity"
                    ></span>
                  </div>
                  <p class="text-slate-600 text-sm" x-text="clause.explanation"></p>
                  <template x-if="clause.quote">
                    <p class="mt-2 text-xs text-slate-500 italic border-l-2 border-red-200 pl-3" x-text="'\"' + clause.quote + '\"'"></p>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Hidden Fees -->
        <template x-if="results.hidden_fees && results.hidden_fees.length">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Hidden Fees
            </h2>
            <div class="space-y-3">
              <template x-for="fee in results.hidden_fees" :key="fee.name">
                <div class="flex items-start justify-between bg-yellow-50 border border-yellow-100 rounded-xl p-4">
                  <div>
                    <p class="font-medium text-yellow-800 text-sm" x-text="fee.name"></p>
                    <p class="text-slate-600 text-sm mt-0.5" x-text="fee.description"></p>
                  </div>
                  <template x-if="fee.amount">
                    <span class="text-yellow-700 font-semibold text-sm ml-4 shrink-0" x-text="fee.amount"></span>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Recommendations -->
        <template x-if="results.recommendations && results.recommendations.length">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Recommendations
            </h2>
            <ul class="space-y-2">
              <template x-for="rec in results.recommendations" :key="rec">
                <li class="flex items-start gap-2 text-sm text-slate-600">
                  <svg class="w-4 h-4 text-green-500 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                  </svg>
                  <span x-text="rec"></span>
                </li>
              </template>
            </ul>
          </div>
        </template>

        <!-- Analyze Another -->
        <div class="text-center">
          <button @click="reset()" class="text-blue-600 hover:text-blue-800 text-sm underline">Analyze another lease</button>
        </div>

      </div>
    </template>

  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-slate-400 pb-10">
    LeaseScan AI · Not legal advice · Always consult a professional
  </footer>

  <script>
    function leaseApp() {
      return {
        file: null,
        location: '',
        bedrooms: '1',
        isDragging: false,
        loading: false,
        results: null,
        error: null,
        features: [
          'Risky clause detection',
          'Hidden fee breakdown',
          'Rent vs. market comparison',
          'Plain-English explanations',
          'Negotiation tips'
        ],

        handleDrop(e) {
          this.isDragging = false;
          const f = e.dataTransfer.files[0];
          if (f && f.type === 'application/pdf') { this.file = f; this.error = null; }
          else this.error = 'Please upload a PDF file.';
        },

        handleFileInput(e) {
          const f = e.target.files[0];
          if (f) { this.file = f; this.error = null; }
        },

        clearFile() {
          this.file = null;
          this.$refs.fileInput.value = '';
        },

        formatSize(bytes) {
          if (bytes < 1024) return bytes + ' B';
          if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
          return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        },

        async analyze() {
          if (!this.file || this.loading) return;
          this.loading = true;
          this.error = null;
          this.results = null;

          try {
            const fd = new FormData();
            fd.append('file', this.file);
            if (this.location) fd.append('location', this.location);
            fd.append('bedrooms', this.bedrooms);

            const res = await fetch('/api/analyze', { method: 'POST', body: fd });
            const data = await res.json();

            if (!res.ok) throw new Error(data.detail || 'Analysis failed. Please try again.');
            this.results = data;
          } catch (err) {
            this.error = err.message || 'Something went wrong. Please try again.';
          } finally {
            this.loading = false;
          }
        },

        reset() {
          this.file = null;
          this.results = null;
          this.error = null;
          this.location = '';
          this.bedrooms = '1';
          if (this.$refs.fileInput) this.$refs.fileInput.value = '';
        }
      };
    }
  </script>
</body>
</html>
